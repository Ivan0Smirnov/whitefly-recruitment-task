version: "3.9"

services:
  web:
    build: .
    command: flask --app app run --host=0.0.0.0 --port=5000
    ports:
      - "5000:5000"
    depends_on:
      - db
      - redis
  worker:
    build: .
    command: celery -A tasks worker --loglevel=info
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: recruitment_tasks_whitefly
      POSTGRES_USER: ivansmirnov
      POSTGRES_PASSWORD: whitefly

  redis:
    image: redis:7
