version: "3.9"

services:

  # --- Shared infrastructure ---
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: recruitment_tasks_whitefly
      POSTGRES_USER: ivansmirnov
      POSTGRES_PASSWORD: whitefly

  redis:
    image: redis:7

  # --- FastAPI app ---
  fastapi:
    build: ./fastapi_app
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --workers 4
    expose:
      - "8000"
    env_file:
      - ./.env
    depends_on:
      - db
      - redis

  fastapi_worker:
    build: ./fastapi_app
    command: celery -A tasks worker --loglevel=info
    env_file:
      - ./.env
    depends_on:
      - db
      - redis

  # --- Flask app ---
  flask:
    build: ./flask_app
    command: uwsgi --ini uwsgi.ini
    expose:
      - "5000"
    env_file:
      - ./.env
    depends_on:
      - db
      - redis

  flask_worker:
    build: ./flask_app
    command: celery -A tasks worker --loglevel=info
    env_file:
      - ./.env
    depends_on:
      - db
      - redis

  # --- Nginx reverse proxy ---
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - fastapi
      - flask