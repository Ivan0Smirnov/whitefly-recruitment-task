version: "3.9"

services:
  web:
    build: .
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A tasks worker --loglevel=info
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: recruitment_tasks_whitefly
      POSTGRES_USER: ivansmirnov
      POSTGRES_PASSWORD: whitefly


  redis:
    image: redis:7
